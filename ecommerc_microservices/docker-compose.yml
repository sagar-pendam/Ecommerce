services:
  eureka-server:
    build: ./Service-Register
    container_name: eureka-server
    ports:
      - "8761:8761"
    restart: always

  config-server:
    build: ./SpringBootMs-ConfigServer
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - eureka-server
    restart: always

  api-gateway:
    build: ./API-Gateway
    container_name: api-gateway
    ports:
      - "9191:9191"
    depends_on:
      - eureka-server
      - config-server
    restart: always

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 30s
      timeout: 20s
      retries: 20
      start_period: 180s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: always
    # No healthcheck – Kafka will wait for service_started

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_started   # changed from service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 120s

  product-service:
    build: ./ProductService
    container_name: product-service
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    restart: always

  auth-service:
    build: ./AuthenticationServiceWIthJWT
    container_name: auth-service
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    restart: always

  cart-service:
    build: ./cart-service
    container_name: cart-service
    ports:
      - "9094:9094"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    restart: always

  wishlist-service:
    build: ./wishlist-service
    container_name: wishlist-service
    ports:
      - "8091:8091"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    restart: always

  inventory-service:
    build: ./InventoryService
    container_name: inventory-service
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: always

  order-service:
    build: ./OrderService
    container_name: order-service
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: always

  payment-service:
    build: ./PaymentService
    container_name: payment-service
    ports:
      - "8089:8089"
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}   # Replace with your actual key
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: always

  review-service:
    build: ./review-service
    container_name: review-service
    ports:
      - "9095:9095"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    restart: always

volumes:
  mysql_data:
