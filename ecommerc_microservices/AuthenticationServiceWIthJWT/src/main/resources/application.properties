spring.application.name=auth-service
server.port=8087

# ===============================
# Database
# ===============================
spring.datasource.url=jdbc:mysql://mysql:3306/authdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# Eureka
# ===============================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=auth-service

# ===============================
# Config Server
# ===============================
spring.config.import=optional:configserver:http://config-server:8888

# ===============================
# OAuth / JWT
# ===============================
spring.security.oauth2.authorizationserver.issuer-uri=http://auth-service:8087
