spring.application.name=inventory-service
server.port=8085

# Database
spring.datasource.url=jdbc:mysql://mysql:3306/inventorydb?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=eureka-server
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka

# Config Server
spring.config.import=optional:configserver:http://config-server:8888

# Kafka
spring.kafka.bootstrap-servers=kafka:9092

# Kafka Producer JSON
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Consumer JSON
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted-packages=com.ecommerce.inventoryservice.model
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.properties.spring.json.value.default.type=com.ecommerce.events.InventoryEvent


