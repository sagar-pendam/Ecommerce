spring.application.name=inventory-service
server.port=8085

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

eureka.instance.prefer-ip-address=true
eureka.instance.hostname=inventory-service
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka

spring.config.import=optional:configserver:http://config-server:8888

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted-packages=com.ecommerce.inventoryservice.model
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.properties.spring.json.value.default.type=com.ecommerce.events.InventoryEvent